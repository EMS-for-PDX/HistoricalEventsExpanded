 story_anarchy_at_samarra: "The Anarchy at Samarra"
 story_anarchy_at_samarra_desc: "A new era has begun - one where the caliph has become a puppet with its strings in the hands of the powerful court factions or else those strings would finnd themselves around the caliph's neck. Can you escape the twisted web that has entangled the Caliphate? "