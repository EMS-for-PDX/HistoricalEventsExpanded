 #HEE Anarchy at Samarra Peril Events
 HEE_AaS.0001.t: "Scholars vs. Soldiers"
 HEE_AaS.0001.desc: "The halls of my court in Samarra echo with more than the usual intrigues today. Word spreads like fire through dry reeds:            Religious scholars denounce the Turkish military elite’s control over the caliphate. Do you side with the ulema and risk a mutiny, or continue to appease the Turks?"
 HEE_AaS.0001.a: "The ulama must learn to mind his tongue..."
 HEE_AaS.0001.b: "Perhaps this ulama can see reason."
 HEE_AaS.0001.c: "The ulama speaks true!"
 HEE_AaS.0001.b.crit_success: "The ulama comes to understand your struggle"
 HEE_AaS.0001.b.success: "Your arguments tempers the ulama's rhetoric"
 HEE_AaS.0001.b.failure: "Your arguments only enflames tensions"

