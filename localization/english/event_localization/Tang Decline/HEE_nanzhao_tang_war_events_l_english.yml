 HEE_nanzhao_tang_war.0001.t:0 "A Message Across the Mountains"
 HEE_nanzhao_tang_war.0001.desc:0 "As I wander the halls of my palace, my mind returns to a question that has plagued my mind these last few months. The Tang court showed unexpected kindness last year in allowing my diplomat safe passage home last year — an act of courtesy that necessitates a response. It would be fitting — honorable, even — to send an envoy to Chengdu bearing my gratitude. Such gestures smooth the roads between kingdoms, and kings who forget courtesy often walk alone.\n\nBut another idea has taken root in my mind. The Tang claim strength, yet their lands tremble and their people whisper of unrest. If my envoy smiles warmly enough, if he bows deeply enough, perhaps the governor will let slip what fortifications falter, what fields lie barren, and what hearts have grown restless... and such knowledge is worth more than any courtesy."
 HEE_nanzhao_tang_war.0001.a: "An honorable act deserves an honorable response."
 HEE_nanzhao_tang_war.0001.b: "Let civility mask my true intentions."
 HEE_nanzhao_tang_war.0001.c: "Perhaps inaction is the best action."

 HEE_nanzhao_tang_war.0002.t:0 "A Southern Envoy"
 HEE_nanzhao_tang_war.0002.desc:0 "An envoy from the southern kingdom of Nanzhao stands before me - hands folded, smile pleasant, but the weight of his gaze can be felt as keenly as any blade. He speaks of gratitude, of friendship, of past favors honored — but my experience in the Tang Court has taught me words are rarely what they seem. Is this truly a gesture of gratitude from Shilong… or the first probing finger of a hand reaching northward?\n\nAs I watch him walk through my hall, I cannot shake the suspicion that he counts every guard post, studies every crack in our walls, and listens for any tremor in the people’s confidence. His every glance feels like another secret has been gleamed. I tap my fingers against the arm of my seat, pondering the paths before me. I could accept this envoy's words as truth and expel any thoughts on my doubts. Or I could dismiss him outright — make it clear that while we accept his words we do not tolerate his presence.\n\nA darker thought hovers at the edge of my mind: execution. Send Nanzhao a message written in blood rather than with words or ink."
 HEE_nanzhao_tang_war.0002.a: "We shall accept Nanzhao's words and the goodwill it comes with."
 HEE_nanzhao_tang_war.0002.b: "Deceit and treachery prompt only one response: Death."
 HEE_nanzhao_tang_war.0002.c: "With his purpose fulfilled, the Envoy has served his purpose."

 HEE_nanzhao_tang_war.0003.t: "An Insult in Blood"
 HEE_nanzhao_tang_war.0003.desc: "The courier’s words strike like a blade to my chest: my envoy, executed in Chengdu, with his head taken as though he were a bandit rather than the voice of a sovereign court. For a long moment I can only stare at the messenger, the hall around me blurring as fury swells within. The arrogance of the Tang court!\n\nI pace the hall, each step echoing like a war drum. My ministers whisper of caution, of diplomacy, of gathering information before acting. But the time for such games has passed. The Tang must think we are weak after their victories in Annan - that we will take this humiliation meekly. But we remain strong. If the Tang will only understand strength, then strength they shall have — delivered on spearpoint and carried on the smoke of their burning arrogance. Let them tremble. Nanzhao will answer this insult in full."
 HEE_nanzhao_tang_war.0003.a: ""
 HEE_nanzhao_tang_war.0003.b: ""
 HEE_nanzhao_tang_war.0003.c: ""